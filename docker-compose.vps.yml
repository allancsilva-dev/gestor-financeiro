services:
  postgres:
    image: postgres:17-alpine
    container_name: gf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gf-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: vps
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${API_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      APP_DOCS_PUBLIC: ${APP_DOCS_PUBLIC:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      # 'native' -> RemoteIpValve resolve o IP real do cliente (ver application-vps.properties).
      # Esta env var SOBREPÕE o profile; tem que ser 'native' aqui também.
      SERVER_FORWARD_HEADERS_STRATEGY: native
      APP_UPLOAD_DIR: /app/uploads
    # Anexos sobrevivem a recreate do container (ADR-0005 / PROB-0080)
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-8080}/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12

  nginx:
    build:
      context: .
      dockerfile: deploy/vps/Dockerfile.nginx
    container_name: gf-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/vps/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/vps/certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    container_name: gf-certbot
    restart: unless-stopped
    volumes:
      - ./deploy/vps/certbot/conf:/etc/letsencrypt
      - ./deploy/vps/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  postgres-backup:
    build:
      context: .
      dockerfile: deploy/vps/Dockerfile.postgres-backup
    container_name: gf-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
    volumes:
      - ./backups/postgres:/backups
    command:
      - sh
      - -c
      - |
        while true; do
          if [ -z "$${BACKUP_ENCRYPTION_PASSPHRASE}" ]; then
            echo "BACKUP_ENCRYPTION_PASSPHRASE obrigatorio para backup criptografado" >&2
            exit 1
          fi
          file="/backups/$${PGDATABASE}_$$(date +%Y%m%d_%H%M%S).sql.gz"
          pg_dump --no-owner --no-acl | gzip -c > "$$file"
          gpg --batch --yes --pinentry-mode loopback --symmetric --cipher-algo AES256 --passphrase "$${BACKUP_ENCRYPTION_PASSPHRASE}" --output "$$file.gpg" "$$file"
          rm -f "$$file"
          find /backups -type f -name "$${PGDATABASE}_*.sql.gz.gpg" -mtime +"$${BACKUP_RETENTION_DAYS}" -delete
          sleep 86400
        done

volumes:
  postgres_data:
    name: gf_postgres_data
  backend_uploads:
    name: gf_backend_uploads
