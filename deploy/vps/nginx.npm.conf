server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  # Atrás do NPM (2 hops). Append-only (nao sobrescrever): o NPM ja anexou o IP real
  # do cliente ao XFF; aqui anexamos o $remote_addr (= IP do NPM). A cadeia fica
  # [xff-do-cliente, cliente-real, npm]. O RemoteIpValve varre da direita p/ esquerda,
  # pula npm (privado), para no cliente-real (primeiro publico). O valor forjado pelo
  # cliente fica a esquerda do cliente-real e nunca e alcancado.
  # PREMISSA: o NPM DEVE anexar seu $remote_addr ao XFF, nunca so repassar o recebido.
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    proxy_pass http://api:8080/api/;
  }

  location /actuator/health {
    proxy_pass http://api:8080/actuator/health;
  }

  # add_header proprio zera a heranca -> repetir os headers de seguranca aqui tambem.
  location /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  }

  # Headers de seguranca do HTML: o SecurityConfig do Spring so cobre /api/**.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  }
}
