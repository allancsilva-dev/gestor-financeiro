services:
  postgres:
    image: postgres:17-alpine
    container_name: gf-postgres
    environment:
      POSTGRES_DB: gestor_financeiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestor_financeiro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
