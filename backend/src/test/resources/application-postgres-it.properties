spring.application.name=financeiro-postgres-it

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

jwt.secret=integration_test_secret_with_at_least_32_bytes_1234567890
jwt.expiration=900000

server.port=0
cookie.secure=false

cors.allowed.origins=http://localhost:5173
app.docs.public=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

security.auth.max-failed-attempts=3
security.auth.lockout-minutes=1

logging.level.root=WARN
logging.level.com.gestor.financeiro=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
