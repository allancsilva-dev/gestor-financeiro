spring.application.name=financeiro-dev

spring.datasource.url=jdbc:postgresql://localhost:5432/gestor_financeiro
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:dev_secret_key_with_at_least_32_bytes_length_1234567890}
jwt.expiration=900000

server.port=8081
cookie.secure=false

cors.allowed.origins=http://localhost:5173

app.docs.public=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

security.auth.max-failed-attempts=5
security.auth.lockout-minutes=15

logging.level.root=INFO
logging.level.com.gestor.financeiro=DEBUG
logging.level.org.springframework.security=DEBUG
