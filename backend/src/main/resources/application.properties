spring.application.name=financeiro

# ==========================================
# BANCO DE DADOS (Desenvolvimento)
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestor_financeiro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ==========================================
# JWT SEGURANÇA
# ==========================================
# ✅ CRÍTICO: Secret vem de variável de ambiente
# NUNCA commitar a chave real no Git!
jwt.secret=${JWT_SECRET:altere_este_valor_em_desenvolvimento_e_producao}
jwt.expiration=900000

# ==========================================
# SERVIDOR
# ==========================================
server.port=8081
cookie.secure=${COOKIE_SECURE:false}

# Swagger/OpenAPI liberado em desenvolvimento para inspeção da API.
app.docs.public=true

# Exposição mínima de observabilidade para mobile/web e monitoramento básico.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# CORS (Produção - Domínio específico)
# ==========================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ==========================================
# SEGURANÇA — BRUTE FORCE PROTECTION
# ==========================================
security.auth.max-failed-attempts=5
security.auth.lockout-minutes=15

# ==========================================
# LOGS (Produção: reduzir verbosidade)
# ==========================================
logging.level.root=INFO
logging.level.com.gestor.financeiro=DEBUG
logging.level.org.springframework.security=DEBUG
