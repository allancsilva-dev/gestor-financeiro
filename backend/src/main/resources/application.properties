spring.application.name=financeiro

# ==========================================
# BANCO DE DADOS (Desenvolvimento)
# ==========================================
# ✅ CORRIGIDO: Usar variáveis de ambiente
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestor_financeiro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT SEGURANÇA
# ==========================================
# ✅ CRÍTICO: Secret vem de variável de ambiente
# NUNCA commitar a chave real no Git!
jwt.secret=${JWT_SECRET:chave-padrao-APENAS-desenvolvimento-NUNCA-usar-em-producao-trocar-imediatamente}
jwt.expiration=900000

# ==========================================
# SERVIDOR
# ==========================================
server.port=8081

# ==========================================
# LOGS (Produção: reduzir verbosidade)
# ==========================================
logging.level.root=INFO
logging.level.com.gestor.financeiro=DEBUG
logging.level.org.springframework.security=DEBUG
