spring.application.name=financeiro-vps

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://187.77.61.191:5433/dbnexos-gestor-financeiro}
spring.datasource.username=${DB_USERNAME:admin_nexos}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.expiration=900000

server.port=${PORT:8081}
cookie.secure=${COOKIE_SECURE:false}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.docs.public=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

security.auth.max-failed-attempts=5
security.auth.lockout-minutes=15

logging.level.root=INFO
logging.level.com.gestor.financeiro=INFO
logging.level.org.springframework.security=WARN
