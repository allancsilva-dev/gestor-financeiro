spring.application.name=financeiro-vps

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.expiration=900000

server.port=${PORT:8080}
server.forward-headers-strategy=framework
cookie.secure=${COOKIE_SECURE:true}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

app.docs.public=${APP_DOCS_PUBLIC:false}

management.endpoints.web.exposure.include=health,info
# /actuator/health é público (permitAll); detalhes (DB, disco, etc.) só para requisições
# autenticadas para evitar vazamento de infraestrutura a anônimos.
management.endpoint.health.show-details=when-authorized

security.auth.max-failed-attempts=5
security.auth.lockout-minutes=15

# SMTP (recuperação de senha). Sem SMTP_HOST o JavaMailSender não é criado
# e o EmailService cai no fallback de log — app sobe normalmente.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:}

logging.level.root=INFO
logging.level.com.gestor.financeiro=INFO
logging.level.org.springframework.security=WARN
