spring.application.name=financeiro

# ==========================================
# BANCO DE DADOS (Produção - Obrigatório)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true

# ==========================================
# JWT SEGURANÇA (Produção - Obrigatório)
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# ==========================================
# SERVIDOR
# ==========================================
server.port=${PORT:8080}
cookie.secure=true

# Em produção, documentação não deve ficar pública.
app.docs.public=false

# Em produção, expor apenas health para sondas de plataforma.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==========================================
# CORS (Produção - Domínio específico)
# ==========================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}

# ==========================================
# SMTP (recuperação de senha)
# ==========================================
# Sem SMTP_HOST o JavaMailSender não é criado e o EmailService
# cai no fallback de log — app sobe normalmente.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:}

# ==========================================
# LOGS (Produção - Reduzido)
# ==========================================
logging.level.root=WARN
logging.level.com.gestor.financeiro=INFO
logging.level.org.springframework.security=WARN
