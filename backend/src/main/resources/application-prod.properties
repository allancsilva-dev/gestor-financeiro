spring.application.name=financeiro

# ==========================================
# BANCO DE DADOS (Produção - Obrigatório)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT SEGURANÇA (Produção - Obrigatório)
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# ==========================================
# SERVIDOR
# ==========================================
server.port=${PORT:8080}

# Em produção, documentação não deve ficar pública.
app.docs.public=false

# Em produção, expor apenas health para sondas de plataforma.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==========================================
# CORS (Produção - Domínio específico)
# ==========================================
cors.allowed.origins=${FRONTEND_URL:https://seu-app.vercel.app}

# ==========================================
# LOGS (Produção - Reduzido)
# ==========================================
logging.level.root=WARN
logging.level.com.gestor.financeiro=INFO
logging.level.org.springframework.security=WARN
