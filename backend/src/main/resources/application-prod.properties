spring.application.name=financeiro

# ==========================================
# BANCO DE DADOS (Produção - Obrigatório)
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://187.77.61.191:5433/dbnexos-gestor-financeiro}
spring.datasource.username=${DB_USERNAME:admin_nexos}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true

# ==========================================
# JWT SEGURANÇA (Produção - Obrigatório)
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# ==========================================
# SERVIDOR
# ==========================================
server.port=${PORT:8080}
cookie.secure=true

# Em produção, documentação não deve ficar pública.
app.docs.public=false

# Em produção, expor apenas health para sondas de plataforma.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==========================================
# CORS (Produção - Domínio específico)
# ==========================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}

# ==========================================
# LOGS (Produção - Reduzido)
# ==========================================
logging.level.root=WARN
logging.level.com.gestor.financeiro=INFO
logging.level.org.springframework.security=WARN
