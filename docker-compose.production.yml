services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: GestorFinanceiro-API
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: vps
      DATABASE_URL: ${DATABASE_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${API_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      APP_DOCS_PUBLIC: ${APP_DOCS_PUBLIC:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      # 'native' -> RemoteIpValve resolve o IP real do cliente (ver application-vps.properties).
      # Esta env var SOBREPÕE o profile; tem que ser 'native' aqui também.
      SERVER_FORWARD_HEADERS_STRATEGY: native
      APP_UPLOAD_DIR: /app/uploads
    # Anexos sobrevivem a recreate do container (ADR-0005 / PROB-0080)
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-8080}/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    # API fora da rede 'proxy': o NPM alcança somente o 'web'. O web fala com a API
    # pela rede interna. Isso impede conexão direta ao :8080 (que forjaria o XFF).
    networks:
      - internal
      - gestor_financeiro_db

  web:
    build:
      context: .
      dockerfile: deploy/vps/Dockerfile.nginx-npm
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: GestorFinanceiro-Web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proxy
      - internal

  postgres-backup:
    image: postgres:17-alpine
    container_name: GestorFinanceiro-Backup
    restart: unless-stopped
    environment:
      PGHOST: ${POSTGRES_HOST:-dbnexos-gestor-financeiro}
      PGPORT: ${POSTGRES_PORT:-5432}
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${DB_USERNAME}
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups/postgres:/backups
    command:
      - sh
      - -c
      - |
        while true; do
          file="/backups/$${PGDATABASE}_$$(date +%Y%m%d_%H%M%S).dump"
          pg_dump -Fc -f "$$file"
          find /backups -type f -name "$${PGDATABASE}_*.dump" -mtime +"$${BACKUP_RETENTION_DAYS}" -delete
          sleep 86400
        done
    networks:
      - gestor_financeiro_db

networks:
  proxy:
    external: true
  gestor_financeiro_db:
    external: true
    name: dbnexos-gestor-financeiro_default
  # Rede privada web<->API. Não exposta ao NPM.
  internal:
    driver: bridge

volumes:
  backend_uploads:
