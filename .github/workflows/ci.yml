name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 17, Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - id: dependency-check-week
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ steps.dependency-check-week.outputs.week }}
          restore-keys: ${{ runner.os }}-dependency-check-
      - run: mvn verify --batch-mode -Psecurity-scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-dependency-check-report
          path: backend/target/dependency-check-report.html
          if-no-files-found: ignore
      - run: ../scripts/verify-postgres-migrations.sh
      - run: mvn compile --batch-mode --quiet

  frontend:
    name: Frontend (Vite + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  mobile:
    name: Mobile (Expo + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npx expo-doctor
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  playwright:
    name: Playwright (Chromium + PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - run: ./scripts/e2e-web.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
            /tmp/gf-backend-e2e.log
          if-no-files-found: ignore
